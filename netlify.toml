[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://psx-portfolio-tracker.netlify.app/*"
  to = "https://psx.blackstar.io/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://psx-portfolio-tracker.netlify.app/*"
  to = "https://psx.blackstar.io/:splat"
  status = 301
  force = true

